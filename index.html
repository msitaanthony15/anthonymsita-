<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Sample Website</title>
    <style>
        /* Internal CSS */
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            padding: 50px;
        }

        header {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
            margin-bottom: 30px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        #output {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Sample Website</h1>
    </header>
    <main>
        <p>This website is hosted on Vercel and managed with Git!</p>
        <button id="clickBtn">Click Me</button>
        <p id="output"></p>
    </main>
    <script>
        // Inline JavaScript
        document.getElementById('clickBtn').addEventListener('click', () => {
            document.getElementById('output').innerText = "You clicked the button! 🎉";
        });
    </script>
</body>
</html>
